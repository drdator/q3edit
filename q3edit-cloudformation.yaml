AWSTemplateFormatVersion: '2010-09-09'
Description: q3edit.com static site on private S3 with CloudFront
Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: q3edit-com-example
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: q3edit.com
      SubjectAlternativeNames: [www.q3edit.com]
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: q3edit.com
          HostedZoneId: Z08905931CIRBY86FY2GV
        - DomainName: www.q3edit.com
          HostedZoneId: Z08905931CIRBY86FY2GV
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: q3edit-s3-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
        Aliases: [q3edit.com, www.q3edit.com]
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}'
  ApexRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z08905931CIRBY86FY2GV
      Name: q3edit.com
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
  ApexIPv6Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z08905931CIRBY86FY2GV
      Name: q3edit.com
      Type: AAAA
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
  WwwRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z08905931CIRBY86FY2GV
      Name: www.q3edit.com
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
  WwwIPv6Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z08905931CIRBY86FY2GV
      Name: www.q3edit.com
      Type: AAAA
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
Outputs:
  DistributionId:
    Value: !Ref Distribution
  Domain:
    Value: !GetAtt Distribution.DomainName
