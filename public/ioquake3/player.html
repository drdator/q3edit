<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q3Edit Player</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background: #000;
      }

      body {
        display: block;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        outline: 0;
        cursor: default !important;
      }

      body.pointer-locked canvas {
        cursor: none !important;
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #aaa;
        background: #111;
        text-align: center;
      }

      #loading.error {
        color: #ff7777;
      }

      #loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="0" aria-label="ioquake3 game view"></canvas>
    <div id="loading" role="status" aria-live="polite">Waiting for compiled map...</div>

    <script type="module">
      const DB_NAME = 'q3edit-assets';
      const PAK_STORE = 'pk3-files';
      const SETTINGS_STORE = 'settings';
      const OPENARENA_KEY = 'openarena-enabled';
      const loading = document.getElementById('loading');
      const canvas = document.getElementById('canvas');
      const nativeGetContext = canvas.getContext.bind(canvas);
      canvas.getContext = (contextType, attributes) => nativeGetContext(
        contextType,
        contextType === 'webgl' || contextType === 'webgl2'
          ? { ...(attributes || {}), preserveDrawingBuffer: true }
          : attributes,
      );
      let started = false;
      let capturePending = false;
      let captureAttempt = 0;
      let handledCaptureFailure = 0;
      let captureRequestedForPointerGesture = false;
      const consoleLines = [];

      function reportCaptureFailure(error, attempt = captureAttempt) {
        if (attempt !== captureAttempt || document.pointerLockElement === canvas) return;
        handledCaptureFailure = attempt;
        capturePending = false;
        const detail = error instanceof Error ? `${error.name}: ${error.message}` : String(error || 'The browser denied pointer lock');
        const message = `Could not capture the mouse. Click the game view to retry. (${detail})`;
        send('q3edit-player:capture-error', { message });
        console.warn(message);
      }

      function requestMouseCapture() {
        if (capturePending || document.pointerLockElement === canvas) return;
        if (typeof canvas.requestPointerLock !== 'function') {
          reportCaptureFailure('Pointer Lock is not supported by this browser');
          return;
        }

        const attempt = ++captureAttempt;
        capturePending = true;
        canvas.focus({ preventScroll: true });
        try {
          // Promise.resolve also supports browsers whose older implementation
          // returns undefined instead of a Promise.
          void Promise.resolve(canvas.requestPointerLock()).catch((error) => {
            reportCaptureFailure(error, attempt);
          });
        } catch (error) {
          reportCaptureFailure(error, attempt);
        }
      }

      function updatePointerLockState() {
        const captured = document.pointerLockElement === canvas;
        capturePending = false;
        document.body.classList.toggle('pointer-locked', captured);
        send('q3edit-player:capture', { captured });
      }

      function blockUncapturedMouseInput(event) {
        if (document.pointerLockElement === canvas) return;
        const isCaptureGesture = event.target === canvas && (
          event.type === 'pointerdown'
          || (event.type === 'mousedown' && typeof window.PointerEvent === 'undefined')
        );
        if (isCaptureGesture) {
          captureRequestedForPointerGesture = true;
          requestMouseCapture();
        }
        event.stopImmediatePropagation();
        event.stopPropagation();
        if (event.type === 'wheel' || event.type === 'contextmenu') event.preventDefault();
      }

      function blockUncapturedKeyboardInput(event) {
        if (document.pointerLockElement === canvas) return;
        event.stopImmediatePropagation();
        event.stopPropagation();
      }

      document.addEventListener('pointerlockchange', updatePointerLockState);
      document.addEventListener('pointerlockerror', () => {
        const attempt = captureAttempt;
        capturePending = false;
        // Modern browsers also reject the request Promise with the useful
        // DOMException. Give that microtask a chance to report before falling
        // back to the event, which carries no error details.
        window.setTimeout(() => {
          if (handledCaptureFailure !== attempt) reportCaptureFailure(null, attempt);
        }, 0);
      });
      for (const eventType of [
        'mousemove', 'mousedown', 'mouseup',
        'pointermove', 'pointerdown', 'pointerup',
        'wheel', 'contextmenu',
      ]) {
        window.addEventListener(eventType, blockUncapturedMouseInput, { capture: true, passive: false });
      }
      for (const eventType of ['keydown', 'keyup', 'keypress']) {
        window.addEventListener(eventType, blockUncapturedKeyboardInput, true);
      }
      canvas.addEventListener('click', (event) => {
        if (document.pointerLockElement === canvas) return;
        event.stopImmediatePropagation();
        if (captureRequestedForPointerGesture) {
          captureRequestedForPointerGesture = false;
          return;
        }
        requestMouseCapture();
      });

      function send(type, detail = {}) {
        window.parent.postMessage({ type, ...detail }, window.location.origin);
      }

      function setStatus(message) {
        loading.textContent = message;
        send('q3edit-player:status', { message });
      }

      function fail(error) {
        const message = error instanceof Error ? error.message : String(error);
        loading.classList.add('error');
        loading.hidden = false;
        loading.textContent = `Could not start ioquake3: ${message}`;
        send('q3edit-player:error', { message });
        console.error(error);
      }

      function requestResult(request) {
        return new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error ?? new Error('Browser storage request failed'));
        });
      }

      function openDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error ?? new Error('Could not open Q3Edit asset storage'));
        });
      }

      async function loadStoredConfiguration() {
        const db = await openDatabase();
        try {
          if (!db.objectStoreNames.contains(PAK_STORE) || !db.objectStoreNames.contains(SETTINGS_STORE)) {
            throw new Error('Q3Edit asset storage has not been initialized');
          }
          const tx = db.transaction([PAK_STORE, SETTINGS_STORE], 'readonly');
          const archivesPromise = requestResult(tx.objectStore(PAK_STORE).getAll());
          const settingPromise = requestResult(tx.objectStore(SETTINGS_STORE).get(OPENARENA_KEY));
          const [archives, setting] = await Promise.all([archivesPromise, settingPromise]);
          archives.sort((a, b) => {
            if (typeof a.order === 'number' && typeof b.order === 'number') return a.order - b.order;
            if (typeof a.order === 'number') return -1;
            if (typeof b.order === 'number') return 1;
            return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
          });
          return { archives, openArenaEnabled: setting?.value ?? true };
        } finally {
          db.close();
        }
      }

      async function loadOpenArenaArchives() {
        setStatus('Loading OpenArena asset list...');
        const manifestResponse = await fetch('/openarena/manifest.json');
        if (!manifestResponse.ok) {
          throw new Error(`OpenArena asset list returned HTTP ${manifestResponse.status}`);
        }
        const manifest = await manifestResponse.json();
        if (!Array.isArray(manifest.archives) || manifest.archives.length === 0) {
          throw new Error('OpenArena asset list does not contain any PK3 files');
        }

        const archives = [];
        for (let index = 0; index < manifest.archives.length; index++) {
          const name = manifest.archives[index];
          setStatus(`Loading ${name} (${index + 1} of ${manifest.archives.length})...`);
          const response = await fetch(`/openarena/${encodeURIComponent(name)}`);
          if (!response.ok) throw new Error(`${name} returned HTTP ${response.status}`);
          archives.push({ name, data: await response.arrayBuffer() });
        }
        return archives;
      }

      function safeFileName(name) {
        const basename = String(name).split(/[\\/]/).pop() || 'assets.pk3';
        return basename.replace(/[^a-zA-Z0-9._-]/g, '_');
      }

      async function loadLaunchAssets() {
        const stored = await loadStoredConfiguration();

        // A retail pak0 and OpenArena's pak0 have the same filename. Mixing the
        // two would overwrite one of them in the virtual filesystem and launch
        // the resulting, incompatible archive set as baseoa. A user-provided
        // base pack therefore selects a coherent retail baseq3 installation.
        const hasRetailBase = stored.archives.some(
          (archive) => safeFileName(archive.name).toLowerCase() === 'pak0.pk3',
        );
        if (hasRetailBase) {
          return { archives: stored.archives, gameDir: 'baseq3' };
        }

        if (stored.openArenaEnabled) {
          const archives = await loadOpenArenaArchives();
          archives.push(...stored.archives);
          return { archives, gameDir: 'baseoa' };
        }

        if (stored.archives.length > 0) {
          throw new Error('The enabled PK3 files do not include pak0.pk3. Add the retail base pack or enable OpenArena in the editor.');
        }
        throw new Error('No PK3 files are enabled. Add PK3 files or enable OpenArena in the editor.');
      }

      function installFiles(module, launch, assets) {
        const { archives, gameDir } = assets;
        const root = `/${gameDir}`;
        module.FS.mkdirTree(`${root}/maps`);

        for (let index = 0; index < archives.length; index++) {
          const archive = archives[index];
          const name = safeFileName(archive.name);
          setStatus(`Installing ${name} (${index + 1} of ${archives.length})...`);
          module.FS.writeFile(`${root}/${name}`, new Uint8Array(archive.data));
        }
        module.FS.writeFile(`${root}/maps/${launch.mapName}.bsp`, new Uint8Array(launch.bsp));
        if (launch.aas) {
          module.FS.writeFile(`${root}/maps/${launch.mapName}.aas`, new Uint8Array(launch.aas));
        }
      }

      async function start(launch) {
        try {
          setStatus('Preparing browser-local PK3 files...');
          const assets = await loadLaunchAssets();
          setStatus('Loading ioquake3 WebAssembly runtime...');
          const ioquake3 = (await import('./ioquake3.js')).default;
          await ioquake3({
            canvas,
            arguments: [
              '+set', 'sv_pure', '0',
              '+set', 'net_enabled', '0',
              '+set', 'con_notifytime', '0',
              '+set', 'r_mode', '-2',
              '+set', 'r_fullscreen', '0',
              '+set', 'r_allowResize', '1',
              ...(launch.noclip ? ['+set', 'sv_cheats', '1'] : []),
              ...(launch.botMinPlayers > 0 ? [
                '+set', 'bot_enable', '1',
                '+set', 'bot_minplayers', String(launch.botMinPlayers),
              ] : []),
              '+set', 'com_basegame', assets.gameDir,
              '+devmap', launch.mapName,
              ...((launch.botMinPlayers > 0 || launch.noclip || (launch.commands || []).length > 0) ? ['+wait', '30'] : []),
              ...(launch.botMinPlayers > 0 ? ['+addbot', 'Sarge', '2', 'free', '0'] : []),
              ...(launch.noclip ? ['+noclip'] : []),
              ...(launch.commands || []).flatMap(command => [`+${command.name}`, ...command.args]),
            ],
            locateFile: (file) => new URL(file, import.meta.url).href,
            preRun: [(module) => {
              installFiles(module, launch, assets);
              setStatus(`Starting ${launch.mapName}...`);
            }],
            onRuntimeInitialized: () => {
              setStatus(`Starting ${launch.mapName}...`);
            },
            postRun: [() => {
              window.setTimeout(() => {
                loading.hidden = true;
                const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
                send('q3edit-player:running', {
                  mapName: launch.mapName,
                  botNavigation: Boolean(launch.aas),
                  botMinPlayers: launch.botMinPlayers,
                  botJoined: launch.botMinPlayers > 0 && consoleLines.some(line => /Sarge.*(?:connected|entered the game)/i.test(line)),
                  noclip: launch.noclip && consoleLines.some(line => /\bnoclip\s+ON\b/i.test(line)),
                  commandErrors: [
                    ...consoleLines.filter(line => /unknown command/i.test(line) && /\b(?:noclip|setviewpos|map_restart)\b/i.test(line)),
                    ...consoleLines.filter(line => /Bot 'Sarge' not defined/i.test(line)),
                    ...(launch.botMinPlayers > 0 && consoleLines.some(line => /0 bots parsed/i.test(line))
                      ? ['No bot definitions were found in the loaded PK3 files.'] : []),
                    ...(launch.botMinPlayers > 0 && consoleLines.some(line => /bot library used before being setup/i.test(line))
                      ? ['The bot library could not start. Check the loaded PK3 files and generated AAS.'] : []),
                  ],
                  renderer: {
                    context: gl ? (gl instanceof WebGL2RenderingContext ? 'webgl2' : 'webgl') : 'unavailable',
                    width: canvas.width,
                    height: canvas.height,
                    preserveDrawingBuffer: gl?.getContextAttributes()?.preserveDrawingBuffer === true,
                  },
                });
              }, launch.botMinPlayers > 0 ? 2000 : launch.noclip || (launch.commands || []).length > 0 ? 1500 : 300);
            }],
            print: (message) => {
              console.log(message);
              consoleLines.push(String(message));
              send('q3edit-player:console', { stream: 'stdout', message: String(message) });
            },
            printErr: (message) => {
              console.error(message);
              consoleLines.push(String(message));
              send('q3edit-player:console', { stream: 'stderr', message: String(message) });
            },
          });
        } catch (error) {
          fail(error);
        }
      }

      window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin || event.source !== window.parent) return;
        if (event.data?.type !== 'q3edit-player:launch' || started) return;
        started = true;
        const mapName = String(event.data.mapName || 'compile').replace(/[^a-zA-Z0-9_-]/g, '') || 'compile';
        const bsp = event.data.bsp;
        if (!(bsp instanceof ArrayBuffer)) {
          fail(new Error('The compiled BSP data was not provided'));
          return;
        }
        const aas = event.data.aas instanceof ArrayBuffer ? event.data.aas : null;
        const botMinPlayers = aas
          ? Math.max(0, Math.min(16, Math.trunc(Number(event.data.botMinPlayers) || 0)))
          : 0;
        const commands = Array.isArray(event.data.commands) ? event.data.commands.filter(command =>
          command && ['setviewpos', 'map_restart'].includes(command.name) &&
          Array.isArray(command.args) && command.args.every(argument => typeof argument === 'string')
        ) : [];
        void start({ mapName, bsp, aas, botMinPlayers, noclip: event.data.noclip === true, commands });
      });

      window.addEventListener('error', (event) => fail(event.error ?? event.message));
      window.addEventListener('unhandledrejection', (event) => fail(event.reason));
      send('q3edit-player:ready');
    </script>
  </body>
</html>
